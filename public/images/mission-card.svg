<svg xmlns="http://www.w3.org/2000/svg" width="600" height="370" viewBox="0 0 600 370">
  <defs>
    <clipPath id="card">
      <rect width="600" height="370" rx="16"/>
    </clipPath>
  </defs>

  <rect width="600" height="370" rx="16" fill="#0E0E10" stroke="#2C2C35" stroke-width="1"/>

  <g clip-path="url(#card)">

    <!-- Breadcrumb -->
    <text x="24" y="44" font-family="ui-monospace,'Fira Code',Consolas,monospace" font-size="12" fill="#8A8A99">Explore / DevSync CLI / Test checkout</text>

    <!-- Mission title -->
    <text x="24" y="84" font-family="system-ui,-apple-system,'Segoe UI',sans-serif" font-size="22" font-weight="700" fill="#F0F0F2">Test the checkout flow</text>

    <!-- Project context card -->
    <rect x="24" y="102" width="552" height="78" rx="12" fill="#1A1A1F" stroke="#2C2C35" stroke-width="1"/>
    <text x="40" y="126" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#F0F0F2">DevSync CLI</text>
    <text x="40" y="143" font-family="ui-monospace,monospace" font-size="12" fill="#47B8FF">devsync.cli.dev</text>
    <text x="40" y="162" font-family="ui-monospace,monospace" font-size="12" fill="#8A8A99">Fast CLI for keeping dev environments in sync.</text>

    <!-- Mission callout: left border -->
    <rect x="24" y="198" width="3" height="80" fill="#E8FF47"/>
    <!-- Callout background (right-rounded corners only) -->
    <path d="M 27,198 L 568,198 Q 576,198 576,206 L 576,270 Q 576,278 568,278 L 27,278 Z" fill="#E8FF47" fill-opacity="0.05"/>
    <!-- YOUR MISSION label -->
    <text x="44" y="217" font-family="ui-monospace,monospace" font-size="11" font-weight="600" fill="#E8FF47" letter-spacing="1">YOUR MISSION</text>
    <!-- Mission instructions (2 lines) -->
    <text x="44" y="237" font-family="ui-monospace,monospace" font-size="13" fill="#F0F0F2">Navigate to pricing. Click &#x22;Start Free Trial&#x22;. Complete</text>
    <text x="44" y="257" font-family="ui-monospace,monospace" font-size="13" fill="#F0F0F2">the checkout form. Note any friction or confusion.</text>

    <!-- CTA button -->
    <rect x="24" y="298" width="552" height="48" rx="8" fill="#E8FF47"/>
    <text x="300" y="327" font-family="ui-monospace,monospace" font-size="14" font-weight="600" fill="#0E0E10" text-anchor="middle">Open Project in New Tab</text>

  </g>
</svg>
