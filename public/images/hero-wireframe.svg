<svg xmlns="http://www.w3.org/2000/svg" width="1128" height="705" viewBox="0 0 1128 705">
  <defs>
    <clipPath id="win">
      <rect width="1128" height="705" rx="16"/>
    </clipPath>
  </defs>

  <rect width="1128" height="705" rx="16" fill="#111114"/>

  <g clip-path="url(#win)">

    <!-- ══ CHROME BAR ════════════════════════════════════════════════════════ -->
