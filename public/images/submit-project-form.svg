<svg xmlns="http://www.w3.org/2000/svg" width="600" height="440" viewBox="0 0 600 440">
  <defs>
    <clipPath id="card">
      <rect width="600" height="440" rx="16"/>
    </clipPath>
  </defs>

  <rect width="600" height="440" rx="16" fill="#0E0E10" stroke="#2C2C35" stroke-width="1"/>

  <g clip-path="url(#card)">

    <!-- Title -->
    <text x="32" y="60" font-family="system-ui,-apple-system,'Segoe UI',sans-serif" font-size="22" font-weight="700" fill="#F0F0F2">Submit a Project</text>
    <!-- Subtitle -->
    <text x="32" y="80" font-family="ui-monospace,'Fira Code',Consolas,monospace" font-size="13" fill="#8A8A99">Tell the community what you&#x27;ve built.</text>

    <!-- ── Field 1: Project Name ────────────────────────────────────────── -->
    <text x="32" y="116" font-family="ui-monospace,monospace" font-size="11" fill="#8A8A99" letter-spacing="0.6">PROJECT NAME</text>
    <rect x="32" y="122" width="536" height="40" rx="8" fill="#1A1A1F" stroke="#2C2C35" stroke-width="1"/>
    <text x="48" y="147" font-family="ui-monospace,monospace" font-size="14" fill="#F0F0F2">My Awesome App</text>

    <!-- ── Field 2: Project URL ─────────────────────────────────────────── -->
    <text x="32" y="180" font-family="ui-monospace,monospace" font-size="11" fill="#8A8A99" letter-spacing="0.6">PROJECT URL</text>
    <rect x="32" y="186" width="536" height="40" rx="8" fill="#1A1A1F" stroke="#2C2C35" stroke-width="1"/>
    <text x="48" y="211" font-family="ui-monospace,monospace" font-size="13" fill="#47B8FF">https://myapp.dev</text>

    <!-- ── Field 3: Brief Summary (focused — voltage border) ───────────── -->
    <text x="32" y="244" font-family="ui-monospace,monospace" font-size="11" fill="#8A8A99" letter-spacing="0.6">BRIEF SUMMARY</text>
    <rect x="32" y="250" width="536" height="80" rx="8" fill="#1A1A1F" stroke="#E8FF47" stroke-width="1.5"/>
    <text x="48" y="272" font-family="ui-monospace,monospace" font-size="13" fill="#F0F0F2">A tool that helps developers sync environments...</text>
    <!-- Character counter -->
    <text x="568" y="342" font-family="ui-monospace,monospace" font-size="11" fill="#8A8A99" text-anchor="end">41 / 300</text>

    <!-- ── Buttons ──────────────────────────────────────────────────────── -->
    <!-- Create Project (flex-1) -->
    <rect x="32" y="360" width="420" height="48" rx="8" fill="#E8FF47"/>
    <text x="242" y="389" font-family="ui-monospace,monospace" font-size="14" font-weight="600" fill="#0E0E10" text-anchor="middle">Create Project</text>
    <!-- Cancel -->
    <rect x="464" y="360" width="104" height="48" rx="8" fill="none" stroke="#2C2C35" stroke-width="1"/>
    <text x="516" y="389" font-family="ui-monospace,monospace" font-size="14" fill="#8A8A99" text-anchor="middle">Cancel</text>

  </g>
</svg>
